    <script>
      // Guard against libraries trying to overwrite window.fetch
      if (window.fetch) {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: () => originalFetch,
          set: () => { console.warn('Attempt to overwrite window.fetch blocked.'); },
          configurable: false
        });
      }
    </script>
